<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Comparison — {{pageTitle}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 9.5pt;
      line-height: 1.45;
      color: #111;
      margin: 0;
      padding: 0;
    }
    h1 { font-size: 16pt; margin: 0 0 4px; }
    h2 {
      font-size: 10pt;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin: 16px 0 8px;
    }
    h3 { font-size: 11pt; margin: 12px 0 4px; }
    p { margin: 0 0 6px; }
    .muted { color: #444; font-size: 9pt; }
    .header { margin-bottom: 16px; }
    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0 16px;
    }
    .score-box {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
    }
    .score-num { font-size: 22pt; font-weight: bold; }
    .jd-tags { margin: 8px 0; }
    .tag {
      display: inline-block;
      background: #f4f4f5;
      border-radius: 4px;
      padding: 2px 6px;
      margin: 2px 4px 2px 0;
      font-size: 8.5pt;
    }
    mark {
      background: #fef08a;
      padding: 0 2px;
    }
    table.compare {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: 9pt;
    }
    table.compare th,
    table.compare td {
      border: 1px solid #ddd;
      padding: 6px 8px;
      vertical-align: top;
      width: 50%;
    }
    table.compare th { background: #f8fafc; text-align: left; }
    table.gaps {
      width: 100%;
      border-collapse: collapse;
      font-size: 8.5pt;
    }
    table.gaps th, table.gaps td {
      border: 1px solid #ddd;
      padding: 5px 6px;
      vertical-align: top;
    }
    table.gaps th { background: #f8fafc; }
    .footer {
      margin-top: 20px;
      padding-top: 10px;
      border-top: 1px solid #ccc;
      font-size: 8pt;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Resume Shapeshifter — Comparison Report</h1>
    <p class="muted">{{headerMeta}}</p>
  </div>

  <div class="scores">{{scoresSection}}</div>

  <h2>Job requirements summary</h2>
  <p class="muted">Seniority: {{seniority}}</p>
  {{jdSummarySection}}

  <h2>Experience — side by side</h2>
  {{roleSections}}

  <h2>Gap analysis</h2>
  <table class="gaps">
    <thead>
      <tr>
        <th>Gap</th>
        <th>JD evidence</th>
        <th>Suggested action</th>
      </tr>
    </thead>
    <tbody>{{gapRows}}</tbody>
  </table>

  <div class="footer">{{footer}}</div>
</body>
</html>
