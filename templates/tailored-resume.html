<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tailored Resume — {{pageTitle}}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 11pt;
      line-height: 1.45;
      color: #111;
      margin: 0;
      padding: 0;
    }
    h1 { font-size: 20pt; margin: 0 0 4px; }
    h2 {
      font-size: 11pt;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin: 18px 0 8px;
    }
    h3 { font-size: 12pt; margin: 12px 0 4px; }
    p { margin: 0 0 6px; }
    ul { margin: 0 0 8px; padding-left: 18px; }
    li { margin-bottom: 4px; }
    .muted { color: #444; font-size: 10pt; }
    .contact { font-size: 10pt; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h1>{{contactName}}</h1>
  {{contactLine}}
  {{summarySection}}
  {{skillsSection}}
  {{experienceSection}}
  {{educationSection}}
  <p class="muted" style="margin-top:24px;">{{footerNote}}</p>
</body>
</html>
